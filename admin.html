<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>OAA COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: monospace; padding: 20px; }
        .hidden { display: none !important; }
        .panel { background: #111; border: 1px solid #333; padding: 25px; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        .t-S { color: #fbbf24; } .t-A { color: #3b82f6; } .t-B { color: #34d399; } .t-C { color: #fb923c; } .t-D { color: #f87171; } .t-N { color: #555; }
        button { background: #ef4444; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth" style="text-align:center; margin-top:100px;">
        <input type="password" id="pw" style="padding:10px; text-align:center;"><br><br>
        <button onclick="login()">ACCESS SYSTEM</button>
    </div>
    <div id="dash" class="hidden" style="display:grid; grid-template-columns: 320px 1fr; gap:20px;">
        <div class="panel">
            <h3>MISSION DISPATCH</h3>
            <select id="sub" style="width:100%; padding:10px; margin-bottom:10px;"><option>國文</option><option>英文</option><option>數學</option><option>物理</option><option>地科</option><option>公民</option><option>歷史</option></select>
            <input type="text" id="title" placeholder="任務名稱" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <button onclick="send()" style="width:100%;">發布任務</button>
        </div>
        <div class="panel">
            <h3>STUDENT天梯榜</h3>
            <table><thead><tr><th>RANK</th><th>NAME</th><th>AVG SCORE</th><th>OVERALL</th></tr></thead><tbody id="list"></tbody></table>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A", authDomain: "oaa-system-338b3.firebaseapp.com", projectId: "oaa-system-338b3", storageBucket: "oaa-system-338b3.firebasestorage.app", messagingSenderId: "245860425104", appId: "1:245860425104:web:9b224f32dd70763bda2715" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function getTier(avg) {
            if (avg === null || avg === undefined) return { t: '未定', c: 't-N' };
            if (avg >= 95) return { t: 'S', c: 't-S' };
            if (avg >= 85) return { t: 'A+', c: 't-A' };
            if (avg >= 80) return { t: 'A', c: 't-A' };
            if (avg >= 70) return { t: 'B', c: 't-B' };
            if (avg >= 60) return { t: 'C', c: 't-C' };
            return { t: 'D', c: 't-D' };
        }

        function login() { if(document.getElementById('pw').value === 'Ricky_0414') { document.getElementById('auth').style.display='none'; document.getElementById('dash').style.display='grid'; refresh(); } }
        async function send() { const t = document.getElementById('title').value; if(!t) return; await db.collection("missions").add({ title: t, subject: document.getElementById('sub').value, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("任務已發出！"); }

        async function refresh() {
            db.collection("users").onSnapshot(snap => {
                let users = [];
                snap.forEach(doc => {
                    const d = doc.data(); let sum = 0, c = 0;
                    (d.history || []).forEach(h => { sum += h.score; c++; });
                    d.avg = c > 0 ? sum / c : null; users.push(d);
                });
                users.sort((a,b) => (b.avg || 0) - (a.avg || 0));
                const list = document.getElementById('list'); list.innerHTML = "";
                users.forEach((u, i) => {
                    const t = getTier(u.avg);
                    list.innerHTML += `<tr><td>#${i+1}</td><td>${u.username}<br><small>${u.loginId}</small></td><td>${u.avg ? u.avg.toFixed(1) : '未定'}</td><td class="${t.c}">${t.t}</td></tr>`;
                });
            });
        }
    </script>
</body>
</html>
