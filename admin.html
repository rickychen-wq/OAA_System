<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAA System | Student Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #07080a;
            --panel-bg: rgba(0, 30, 40, 0.6);
            --border-blue: rgba(0, 242, 255, 0.4);
            --text-main: #e0ffff;
            --glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Share Tech Mono', 'Noto Sans TC', sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        /* 掃描線與噪點背景 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 999; opacity: 0.6;
        }

        .hidden { display: none !important; }

        /* ================= 登入介面 ================= */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #112 0%, #000 100%); z-index: 1000;
        }

        .login-box {
            border: 1px solid var(--neon-blue); padding: 40px; text-align: center;
            background: rgba(0, 20, 30, 0.5); box-shadow: var(--glow);
            backdrop-filter: blur(5px); width: 80%; max-width: 350px;
        }

        .login-box h1 { margin: 0 0 10px 0; color: var(--neon-blue); letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-blue); }
        .login-box p { color: #88c; font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 1px; }

        input.cyber-input {
            width: 100%; background: rgba(0,0,0,0.8); color: var(--neon-blue);
            border: 1px solid var(--border-blue); padding: 12px; box-sizing: border-box;
            text-align: center; font-family: inherit; font-size: 1.1rem; margin-bottom: 20px;
            transition: 0.3s;
        }
        input.cyber-input:focus { outline: none; box-shadow: var(--glow); border-color: var(--neon-blue); }

        button.cyber-btn {
            width: 100%; background: transparent; color: var(--neon-blue);
            border: 1px solid var(--border-blue); padding: 12px; font-family: inherit;
            font-weight: bold; cursor: pointer; letter-spacing: 2px; transition: 0.3s;
        }
        button.cyber-btn:hover { background: var(--neon-blue); color: #000; box-shadow: var(--glow); }

        /* ================= 主儀表板 ================= */
        .dashboard {
            max-width: 800px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 20px;
            padding-bottom: 50px;
        }

        .header {
            text-align: center; border-bottom: 1px solid var(--border-blue); padding-bottom: 15px; margin-bottom: 10px;
        }
        .header h2 { margin: 5px 0; font-size: 1.8rem; letter-spacing: 2px; }
        .user-id { color: var(--neon-blue); font-size: 0.85rem; }

        .panel {
            background: var(--panel-bg); border: 1px solid var(--border-blue);
            padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            position: relative;
        }
        .panel-title { font-size: 1rem; color: var(--neon-blue); border-bottom: 1px dashed rgba(0,242,255,0.3); padding-bottom: 8px; margin-bottom: 15px; }

        /* 雷達圖與分數區塊 */
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; } }

        .chart-container { position: relative; height: 280px; width: 100%; display: flex; justify-content: center; align-items: center; }
        
        .rank-display { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        #overall-rank { font-size: 6rem; font-weight: bold; margin: 10px 0; line-height: 1; text-shadow: 0 0 20px currentColor; }
        .avg-score { font-size: 1.2rem; color: #aaa; }
        .avg-score span { color: white; font-weight: bold; font-size: 1.5rem; }

        /* 任務列表 */
        .mission-item {
            background: rgba(0, 0, 0, 0.5); border-left: 3px solid var(--neon-blue);
            padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .mission-item:hover { background: rgba(0, 242, 255, 0.1); }
        .mission-info h4 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .mission-info p { margin: 0; font-size: 0.8rem; color: #88c; }
        .submit-btn { background: var(--neon-blue); color: black; border: none; padding: 6px 15px; font-weight: bold; cursor: pointer; font-family: inherit; }
        .submit-btn:hover { box-shadow: 0 0 10px var(--neon-blue); }
        .completed-tag { color: #00ff88; font-size: 0.9rem; border: 1px solid #00ff88; padding: 4px 8px; }

        /* 評級顏色 */
        .rank-S { color: #ffdf00; }
        .rank-A-plus { color: #00f2ff; }
        .rank-A { color: #00d4ff; }
        .rank-B { color: #00ff88; }
        .rank-C { color: #ffcc00; }
        .rank-D { color: #ff4444; }

        /* ================= 彈出輸入視窗 ================= */
        #score-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 1px solid var(--neon-blue); padding: 30px; width: 300px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>OAA SYSTEM</h1>
            <p>[ TERMINAL INITIALIZATION ]</p>
            <input type="text" id="usernameInput" class="cyber-input" placeholder="ENTER STUDENT ID...">
            <button class="cyber-btn" onclick="authenticate()">> LINK PROFILE_</button>
            <p id="login-msg" style="color: #ff4444; margin-top: 15px; font-size: 0.85rem; height: 15px;"></p>
        </div>
    </div>

    <div id="score-modal" class="hidden">
        <div class="modal-content">
            <h3 style="color: var(--neon-blue); margin-top: 0;" id="modal-mission-title">MISSION TITLE</h3>
            <p style="color: #aaa; font-size: 0.9rem;" id="modal-subject">SUBJECT</p>
            <input type="number" id="score-input" class="cyber-input" placeholder="輸入分數 (0-100)" min="0" max="100">
            <div style="display: flex; gap: 10px;">
                <button class="cyber-btn" style="border-color: #555; color: #aaa;" onclick="closeModal()">CANCEL</button>
                <button class="cyber-btn" onclick="submitScore()">> SUBMIT</button>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="dashboard hidden">
        
        <div class="header">
            <div class="user-id">UID: <span id="display-uid">--------</span></div>
            <h2 id="display-name">STUDENT_NAME</h2>
        </div>

        <div class="panel stats-grid">
            <div class="rank-display">
                <div style="color: var(--neon-blue); letter-spacing: 2px;">OVERALL ABILITY</div>
                <div id="overall-rank">--</div>
                <div class="avg-score">AVG: <span id="avg-display">0.0</span></div>
            </div>
            <div class="chart-container">
                <canvas id="oaaChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">> MISSION INBOX (待辦任務)</div>
            <div id="mission-list">
                <p style="color: #666; text-align: center;">[ NO ACTIVE MISSIONS ]</p>
            </div>
        </div>
    </div>

    <script>
        // ------------------ Firebase 設置 (你的專屬金鑰) ------------------
        const firebaseConfig = {
            apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A",
            authDomain: "oaa-system-338b3.firebaseapp.com",
            projectId: "oaa-system-338b3",
            storageBucket: "oaa-system-338b3.firebasestorage.app",
            messagingSenderId: "245860425104",
            appId: "1:245860425104:web:9b224f32dd70763bda2715"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 系統全局變數
        let currentUserDocId = null;
        let currentUsername = "";
        let currentScores = {};
        let completedMissions = []; // 記錄該使用者已完成的任務ID
        let oaaChartInstance = null;

        // 當前正在填寫的任務暫存
        let activeMissionId = null;
        let activeSubject = null;

        // ------------------ 登入邏輯 (無密碼 ID 綁定) ------------------
        async function authenticate() {
            const nameInput = document.getElementById('usernameInput').value.trim();
            const msgEl = document.getElementById('login-msg');

            if (!nameInput) { msgEl.innerText = "ERROR: 必須輸入 ID。"; return; }
            msgEl.innerText = "CONNECTING DATABASE..."; msgEl.style.color = "var(--neon-blue)";

            try {
                // 去資料庫找這個名字
                const snapshot = await db.collection("users").where("username", "==", nameInput).get();
                
                if (!snapshot.empty) {
                    // 找到舊用戶，直接登入
                    const doc = snapshot.docs[0];
                    currentUserDocId = doc.id;
                    const data = doc.data();
                    currentUsername = data.username;
                    currentScores = data.scores || {};
                    completedMissions = data.completedMissions || [];
                } else {
                    // 找不到，建立新用戶
                    const newUserData = {
                        username: nameInput,
                        scores: { "國文": 0, "英文": 0, "數學": 0, "物理": 0, "地科": 0, "公民": 0, "歷史": 0 },
                        completedMissions: [],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    const newDocRef = await db.collection("users").add(newUserData);
                    currentUserDocId = newDocRef.id;
                    currentUsername = nameInput;
                    currentScores = newUserData.scores;
                    completedMissions = [];
                }

                // 切換畫面
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                
                // 更新 UI
                document.getElementById('display-name').innerText = currentUsername;
                document.getElementById('display-uid').innerText = currentUserDocId.substring(0, 8).toUpperCase();
                
                updateStatsUI();
                listenToMissions(); // 開始監聽後台發送的任務

            } catch (error) {
                console.error("登入失敗:", error);
                msgEl.innerText = "ERROR: 系統連線異常。";
                msgEl.style.color = "#ff4444";
            }
        }

        // ------------------ 更新 UI 與雷達圖 ------------------
        function updateStatsUI() {
            const subjects = ["國文", "英文", "數學", "物理", "地科", "公民", "歷史"];
            const scoresArray = subjects.map(sub => currentScores[sub] || 0);

            // 計算平均與等級
            const avg = scoresArray.reduce((a,b) => a + b, 0) / subjects.length;
            document.getElementById('avg-display').innerText = avg.toFixed(1);

            let rank = "E", rankClass = "rank-D";
            if (avg >= 95) { rank = "S"; rankClass = "rank-S"; }
            else if (avg >= 85) { rank = "A+"; rankClass = "rank-A-plus"; }
            else if (avg >= 80) { rank = "A"; rankClass = "rank-A"; }
            else if (avg >= 70) { rank = "B"; rankClass = "rank-B"; }
            else if (avg >= 60) { rank = "C"; rankClass = "rank-C"; }

            const rankEl = document.getElementById('overall-rank');
            rankEl.innerText = rank;
            rankEl.className = rankClass;

            // 繪製或更新雷達圖
            const ctx = document.getElementById('oaaChart').getContext('2d');
            if (oaaChartInstance) {
                oaaChartInstance.data.datasets[0].data = scoresArray;
                oaaChartInstance.update();
            } else {
                oaaChartInstance = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: subjects,
                        datasets: [{
                            data: scoresArray,
                            backgroundColor: 'rgba(0, 242, 255, 0.2)',
                            borderColor: '#00f2ff', borderWidth: 2,
                            pointBackgroundColor: '#fff', pointBorderColor: '#00f2ff', pointRadius: 4
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        scales: { 
                            r: { 
                                angleLines: { color: 'rgba(255,255,255,0.1)' },
                                grid: { color: 'rgba(255,255,255,0.2)' },
                                pointLabels: { color: '#ccc', font: { family: 'Share Tech Mono', size: 12 } },
                                suggestedMin: 0, suggestedMax: 100, ticks: { display: false } 
                            } 
                        }, 
                        plugins: { legend: { display: false } } 
                    }
                });
            }
        }

        // ------------------ 任務監聽與回報系統 ------------------
        function listenToMissions() {
            // 即時監聽 missions 資料表
            db.collection("missions").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const missionListEl = document.getElementById('mission-list');
                missionListEl.innerHTML = ""; // 清空

                if (snapshot.empty) {
                    missionListEl.innerHTML = `<p style="color: #666; text-align: center;">[ NO ACTIVE MISSIONS ]</p>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const mission = doc.data();
                    const mid = doc.id;
                    const isCompleted = completedMissions.includes(mid);

                    const div = document.createElement('div');
                    div.className = 'mission-item';
                    
                    let actionBtn = `<button class="submit-btn" onclick="openModal('${mid}', '${mission.subject}', '${mission.title}')">INPUT SCORE</button>`;
                    if (isCompleted) {
                        actionBtn = `<div class="completed-tag">COMPLETED</div>`;
                    }

                    div.innerHTML = `
                        <div class="mission-info">
                            <h4>${mission.title}</h4>
                            <p>Target: ${mission.subject}</p>
                        </div>
                        ${actionBtn}
                    `;
                    missionListEl.appendChild(div);
                });
            });
        }

        // 開啟分數輸入彈窗
        function openModal(mid, subject, title) {
            activeMissionId = mid;
            activeSubject = subject;
            document.getElementById('modal-mission-title').innerText = title;
            document.getElementById('modal-subject').innerText = `科目：${subject}`;
            document.getElementById('score-input').value = "";
            document.getElementById('score-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('score-modal').classList.add('hidden');
        }

        // 提交分數至資料庫
        async function submitScore() {
            const scoreVal = parseInt(document.getElementById('score-input').value);
            if (isNaN(scoreVal) || scoreVal < 0 || scoreVal > 100) {
                alert("請輸入 0 到 100 之間的有效分數！"); return;
            }

            try {
                // 1. 更新本地資料
                currentScores[activeSubject] = scoreVal;
                completedMissions.push(activeMissionId);

                // 2. 更新畫面 (雷達圖與分數會瞬間跳動)
                updateStatsUI();
                closeModal();

                // 3. 寫入 Firebase 資料庫
                await db.collection("users").doc(currentUserDocId).update({
                    [`scores.${activeSubject}`]: scoreVal,
                    completedMissions: firebase.firestore.FieldValue.arrayUnion(activeMissionId)
                });

            } catch (error) {
                console.error("更新分數失敗:", error);
                alert("系統錯誤，分數上傳失敗。");
            }
        }
    </script>
</body>
</html>
