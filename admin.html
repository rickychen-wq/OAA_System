<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>OAA Admin | Command Center Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #050505; --panel-bg: rgba(20, 5, 5, 0.8); --border-red: #ff3333; --text-main: #ff4444; --glow: 0 0 15px rgba(255, 51, 51, 0.5); }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Share Tech Mono', monospace; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255, 0, 0, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 0, 0.03) 1px, transparent 1px); background-size: 30px 30px; }
        .hidden { display: none !important; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; z-index: 9999; }
        .auth-box { border: 1px solid var(--border-red); padding: 40px; text-align: center; background: rgba(255,0,0,0.05); box-shadow: var(--glow); width: 320px; }
        input.admin-input { width: 100%; background: #111; color: white; border: 1px solid var(--border-red); padding: 12px; text-align: center; margin: 20px 0; font-size: 1.2rem; }
        button.cyber-btn { width: 100%; background: transparent; color: var(--text-main); border: 1px solid var(--border-red); padding: 12px; font-weight: bold; cursor: pointer; }
        button.cyber-btn:hover { background: var(--text-main); color: #000; box-shadow: var(--glow); }
        #dashboard { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
        aside { border-right: 1px solid var(--border-red); padding: 25px; background: rgba(10,0,0,0.8); display: flex; flex-direction: column; gap: 15px; }
        select, input[type="text"] { width: 100%; background: #111; border: 1px solid #883333; color: white; padding: 12px; margin-bottom: 10px; }
        main { padding: 30px; overflow-y: auto; }
        .card { border: 1px solid var(--border-red); background: var(--panel-bg); padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.5); }
        th, td { border: 1px solid rgba(255,51,51,0.3); padding: 12px; text-align: center; }
        th { background: rgba(255,0,0,0.15); color: #883333; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <div class="auth-box">
            <h1 style="margin: 0 0 5px 0; text-shadow: 0 0 10px red;">RESTRICTED AREA</h1>
            <p style="color: #883333; margin:0; font-size:0.8rem;">OAA COMMAND CENTER</p>
            <input type="password" id="passcode" class="admin-input" placeholder="ENTER CODE">
            <button class="cyber-btn" onclick="verifyCode()">> VERIFY & ENTER</button>
            <p id="auth-msg" style="color: red; margin-top: 10px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <aside>
            <div style="font-size: 1.2rem; border-bottom: 1px dashed #883333; padding-bottom: 10px; margin-bottom: 10px; font-weight: bold;">> MISSION DISPATCHER</div>
            <label style="color: #883333; font-size: 0.9rem;">TARGET SUBJECT</label>
            <select id="subject-select">
                <option>國文</option><option>英文</option><option>數學</option><option>物理</option><option>地科</option><option>公民</option><option>歷史</option>
            </select>
            <label style="color: #883333; font-size: 0.9rem;">MISSION TITLE</label>
            <input type="text" id="mission-title" placeholder="例如: 第三次段考">
            <button class="cyber-btn" onclick="dispatchMission()" style="margin-top: 20px;">> EXECUTE PROTOCOL</button>
            <div id="status-msg" style="text-align: center; font-size: 0.9rem; margin-top: 15px; height: 20px;"></div>
        </aside>
        <main>
            <div class="card" style="display: flex; gap: 20px;">
                <div><div style="color: #883333;">總人數</div><div style="font-size: 3rem; font-weight: bold;" id="total-users">0</div></div>
                <div><div style="color: #883333;">任務數</div><div style="font-size: 3rem; font-weight: bold;" id="total-missions">0</div></div>
            </div>
            <div class="card">
                <div style="font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between;">
                    <span>> STUDENT ROSTER (即時戰力榜)</span>
                    <button onclick="fetchDatabase()" style="background:none; border:1px solid red; color:red; cursor:pointer;">[ REFRESH ]</button>
                </div>
                <table>
                    <thead><tr><th>UID</th><th>NAME</th><th>AVG</th><th>RANK</th></tr></thead>
                    <tbody id="student-tbody"><tr><td colspan="4">LOADING...</td></tr></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A", authDomain: "oaa-system-338b3.firebaseapp.com", projectId: "oaa-system-338b3", storageBucket: "oaa-system-338b3.firebasestorage.app", messagingSenderId: "245860425104", appId: "1:245860425104:web:9b224f32dd70763bda2715" };
        firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

        function verifyCode() {
            if(document.getElementById('passcode').value === "Ricky_0414") {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden'); fetchDatabase();
            } else { document.getElementById('auth-msg').innerText = "ACCESS DENIED"; }
        }

        async function dispatchMission() {
            const title = document.getElementById('mission-title').value.trim(), sub = document.getElementById('subject-select').value, msgEl = document.getElementById('status-msg');
            if(!title) { msgEl.innerText = "[ERROR] 名稱不可為空"; msgEl.style.color="red"; return; }
            msgEl.innerText = "UPLOADING..."; msgEl.style.color = "yellow";
            try {
                await db.collection("missions").add({ title: title, subject: sub, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
                msgEl.innerText = "[SUCCESS] 任務已廣播！"; msgEl.style.color = "#00ff88"; document.getElementById('mission-title').value = ""; fetchDatabase();
            } catch(e) { msgEl.innerText = "[ERROR] 連線異常"; msgEl.style.color="red"; }
        }

        async function fetchDatabase() {
            try {
                const uSnap = await db.collection("users").get(), mSnap = await db.collection("missions").get();
                document.getElementById('total-users').innerText = uSnap.size; document.getElementById('total-missions').innerText = mSnap.size;
                let students = [];
                uSnap.forEach(doc => { let data = doc.data(), vals = Object.values(data.scores || {}); data.avg = vals.length > 0 ? (vals.reduce((a,b)=>a+b,0)/7) : 0; data.uid = doc.id; students.push(data); });
                students.sort((a,b) => b.avg - a.avg);
                const tbody = document.getElementById('student-tbody'); tbody.innerHTML = "";
                if(students.length === 0) { tbody.innerHTML = `<tr><td colspan="4">尚未有學員註冊</td></tr>`; return; }
                students.forEach(s => {
                    let rank = "E", c = "#ff4444";
                    if(s.avg >= 95) { rank = "S"; c="#ffdf00"; } else if(s.avg >= 85) { rank = "A+"; c="#00f2ff"; } else if(s.avg >= 80) { rank = "A"; c="#00f2ff"; } else if(s.avg >= 70) { rank = "B"; c="#00ff88"; } else if(s.avg >= 60) { rank = "C"; c="#ffcc00"; }
                    tbody.innerHTML += `<tr><td>${s.uid.substring(0,8).toUpperCase()}</td><td>${s.username}</td><td>${s.avg.toFixed(1)}</td><td style="color:${c}; font-weight:bold;">${rank}</td></tr>`;
                });
            } catch(e) { document.getElementById('student-tbody').innerHTML = `<tr><td colspan="4" style="color:red;">連線失敗</td></tr>`; }
        }
    </script>
</body>
</html>
