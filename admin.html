<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAA COMMAND CENTER | 終極管理終端</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #111; --red: #ff0000; --red-dim: #880000; --blue: #3b82f6; --green: #10b981; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; background-image: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .hidden { display: none !important; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .auth-box { border: 1px solid var(--red); padding: 50px; text-align: center; background: rgba(20,0,0,0.9); box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        #dashboard { display: grid; grid-template-columns: 350px 1fr; height: 100vh; }
        aside { background: var(--panel); border-right: 1px solid #333; padding: 25px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        main { padding: 30px; overflow-y: auto; }
        .section-title { color: var(--red); font-weight: bold; border-bottom: 1px solid var(--red-dim); padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        select, input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; width: 100%; box-sizing: border-box; font-family: inherit; }
        .cyber-btn { background: var(--red); color: #000; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .cyber-btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        
        /* 清理按鈕組 */
        .clean-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-exe { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; font-size: 0.75rem; cursor: pointer; }
        .btn-exe:hover { background: var(--red); color: #000; }
        .btn-pardon { background: transparent; color: #aaa; border: 1px solid #555; padding: 10px; font-size: 0.75rem; cursor: pointer; }
        .btn-pardon:hover { background: #fff; color: #000; border-color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; }
        th { background: rgba(255,0,0,0.1); color: var(--red-dim); }
        .user-row { cursor: pointer; }
        .user-row:hover { background: rgba(255,255,255,0.05); }
        .detail-area { background: #0a0a0a; border: 1px dashed #444; padding: 15px; text-align: left; }
        .status-tag { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
        .bg-red { background: var(--red-dim); color: #fff; }
        .bg-green { background: #065f46; color: #fff; }
        .score-edit { color: var(--blue); text-decoration: underline; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h1 style="color:red; letter-spacing:10px;">ADMIN_ACCESS</h1>
            <input type="password" id="admin-pw" style="text-align:center; font-size:1.5rem;" placeholder="PASSWORD">
            <button class="cyber-btn" onclick="verifyLogin()" style="margin-top:20px;">INITIALIZE LOGIN</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <aside>
            <div class="section-title">> DISPATCH_MISSION</div>
            <select id="sub-select">
                <option>國文</option><option>英文</option><option>數學</option><option>物理</option><option>地科</option><option>公民</option><option>歷史</option>
            </select>
            <input type="text" id="m-title" placeholder="ENTER MISSION TITLE">
            <button class="cyber-btn" onclick="sendMission()">發布任務</button>

            <div class="section-title" style="margin-top:30px;">> SYSTEM_MAINTENANCE</div>
            <div class="clean-group">
                <div style="font-size:0.7rem; color:#888;">[ 處決模式 ]：未填者補 0 分並關閉</div>
                <button class="btn-exe" onclick="cleanUnfinished(true)">TERMINATE: FORCE 0 PTS</button>
                
                <div style="font-size:0.7rem; color:#888; margin-top:10px;">[ 赦免模式 ]：直接清掉任務，不扣分</div>
                <button class="btn-pardon" onclick="cleanUnfinished(false)">PARDON: IGNORE UNFINISHED</button>
            </div>
            <div id="log-msg" style="color:var(--blue); font-size:0.7rem; margin-top:10px;"></div>
        </aside>

        <main>
            <div class="section-title">> OAA REAL-TIME MONITORING (點擊學員查看細節)</div>
            <table id="roster-table">
                <thead>
                    <tr>
                        <th style="width:10%;">RANK</th>
                        <th style="width:35%;">STUDENT / ID</th>
                        <th style="width:15%;">AVG</th>
                        <th style="width:15%;">TIER</th>
                        <th style="width:25%;">STATUS</th>
                    </tr>
                </thead>
                <tbody id="roster-list"></tbody>
            </table>
        </main>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A", authDomain: "oaa-system-338b3.firebaseapp.com", projectId: "oaa-system-338b3", storageBucket: "oaa-system-338b3.firebasestorage.app", messagingSenderId: "245860425104", appId: "1:245860425104:web:9b224f32dd70763bda2715" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let allMissions = [];
    const SUBJECTS = ["國文","英文","數學","物理","地科","公民","歷史"];

    function getTier(avg) {
        if (avg === null) return { t: '--', c: '#444' };
        if (avg >= 95) return { t: 'S', c: '#fbbf24' };
        if (avg >= 85) return { t: 'A+', c: '#3b82f6' };
        if (avg >= 80) return { t: 'A', c: '#3b82f6' };
        if (avg >= 70) return { t: 'B', c: '#10b981' };
        if (avg >= 60) return { t: 'C', c: '#f59e0b' };
        return { t: 'D', c: '#ef4444' };
    }

    function verifyLogin() {
        if(document.getElementById('admin-pw').value === 'Ricky_0414') {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            startSync();
        } else alert("ACCESS DENIED.");
    }

    async function sendMission() {
        const t = document.getElementById('m-title').value.trim();
        if(!t) return;
        await db.collection("missions").add({ title: t, subject: document.getElementById('sub-select').value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById('m-title').value = "";
    }

    // --- 關鍵：雙模式清理功能 ---
    async function cleanUnfinished(isPunish) {
        const modeText = isPunish ? "【處決模式：補 0 分】" : "【赦免模式：不計分】";
        if(!confirm(`確定要執行 ${modeText} 嗎？`)) return;
        
        const msg = document.getElementById('log-msg');
        msg.innerText = "Processing...";
        
        const uSnap = await db.collection("users").get();
        const batch = db.batch();
        let count = 0;

        uSnap.forEach(uDoc => {
            const userData = uDoc.data();
            const completed = userData.completedMissions || [];
            allMissions.forEach(m => {
                if(!completed.includes(m.id)) {
                    const userRef = db.collection("users").doc(uDoc.id);
                    if(isPunish) {
                        // 處決：補一筆 0 分進歷史紀錄
                        const penalty = { mid: m.id, subject: m.subject, score: 0, timestamp: Date.now(), type: 'FORCE_ZERO' };
                        batch.update(userRef, {
                            history: firebase.firestore.FieldValue.arrayUnion(penalty),
                            completedMissions: firebase.firestore.FieldValue.arrayUnion(m.id)
                        });
                    } else {
                        // 赦免：只把任務標記為已完成，但不增加任何成績紀錄
                        batch.update(userRef, {
                            completedMissions: firebase.firestore.FieldValue.arrayUnion(m.id)
                        });
                    }
                    count++;
                }
            });
        });
        await batch.commit();
        msg.innerText = `Operation Complete. ${count} tasks processed.`;
    }

    async function editScore(userId, historyIndex, oldScore) {
        const newScore = prompt(`修改分數:`, oldScore);
        if(newScore === null || isNaN(newScore)) return;
        const uRef = db.collection("users").doc(userId);
        const doc = await uRef.get();
        let history = doc.data().history;
        history[historyIndex].score = parseInt(newScore);
        await uRef.update({ history: history });
    }

    function startSync() {
        db.collection("missions").onSnapshot(mSnap => {
            allMissions = mSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        });

        db.collection("users").onSnapshot(uSnap => {
            let users = [];
            uSnap.forEach(d => {
                const data = d.data();
                let sum = 0, c = 0;
                SUBJECTS.forEach(s => {
                    const h = (data.history || []).filter(x => x.subject === s);
                    if(h.length) { sum += (h.reduce((a,b)=>a+b.score,0)/h.length); c++; }
                });
                data.id = d.id; data.avg = c > 0 ? sum / c : null;
                users.push(data);
            });
            
            users.sort((a,b) => (b.avg || 0) - (a.avg || 0));
            const list = document.getElementById('roster-list');
            list.innerHTML = "";

            users.forEach((u, index) => {
                const tier = getTier(u.avg);
                const unfinished = allMissions.filter(m => !(u.completedMissions || []).includes(m.id));
                const status = unfinished.length > 0 ? `<span class="status-tag bg-red">${unfinished.length} Pending</span>` : `<span class="status-tag bg-green">Clean</span>`;

                const tr = document.createElement('tr');
                tr.className = 'user-row';
                tr.innerHTML = `<td>#${index+1}</td><td><b>${u.username}</b><br><small>${u.loginId}</small></td><td>${u.avg ? u.avg.toFixed(1) : '---'}</td><td style="color:${tier.c}; font-weight:bold;">${tier.t}</td><td>${status}</td>`;

                tr.onclick = () => {
                    const existing = document.getElementById('det-' + u.id);
                    if(existing) { existing.remove(); return; }
                    const detailTr = document.createElement('tr');
                    detailTr.id = 'det-' + u.id;
                    let histHtml = (u.history || []).map((h, i) => `<div style="margin-bottom:5px;">[${h.subject}] <b>${h.score}分</b> <span class="score-edit" onclick="event.stopPropagation(); editScore('${u.id}', ${i}, ${h.score})">EDIT</span></div>`).join('');
                    let unfHtml = unfinished.map(m => `<div>❌ Missing: ${m.title} (${m.subject})</div>`).join('');
                    detailTr.innerHTML = `<td colspan="5" class="detail-area"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;"><div><b style="color:var(--blue);">HISTORY:</b><br>${histHtml || 'None'}</div><div><b style="color:var(--red);">UNFINISHED:</b><br>${unfHtml || 'All Cleared'}</div></div></td>`;
                    tr.parentNode.insertBefore(detailTr, tr.nextSibling);
                };
                list.appendChild(tr);
            });
        });
    }
</script>
</body>
</html>
