<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAA SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a0e17; --surface: rgba(16, 24, 39, 0.7); --border: rgba(59, 130, 246, 0.3); --primary: #3b82f6; --text-main: #f8fafc; --text-sec: #94a3b8; --s: #fbbf24; --a-plus: #38bdf8; --a: #3b82f6; --b: #34d399; --c: #f97316; --d: #ef4444; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: sans-serif; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }
        .glass-panel { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { width: 320px; text-align: center; }
        .auth-box h1 { letter-spacing: 4px; color: var(--primary); margin-bottom: 30px; font-weight: 900; }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .dashboard { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 50px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .top-section { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        @media(min-width: 600px) { .top-section { grid-template-columns: 1fr 1fr; } }
        .overall-box { text-align: center; }
        .overall-rank { font-size: 5rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .sub-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 0.8rem; color: var(--text-sec); }
        .sub-score { font-weight: bold; font-size: 1.1rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-sec); padding: 10px; cursor: pointer; }
        .tab-btn.active { background: rgba(59,130,246,0.2); color: var(--primary); border-color: var(--primary); font-weight: bold; }
        .mission-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .roster-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; }
        .roster-main { display: flex; align-items: center; }
        .rank-num { font-size: 1.2rem; font-weight: 900; color: var(--text-sec); width: 40px; }
        .user-detail-panel { margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .tier-S { color: var(--s); text-shadow: 0 0 10px var(--s); } .tier-A-plus { color: var(--a-plus); } .tier-A { color: var(--a); }
        .tier-B { color: var(--b); } .tier-C { color: var(--c); } .tier-D { color: var(--d); } .tier-null { color: #64748b; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="glass-panel auth-box">
        <h1>OAA SYSTEM</h1>
        <div id="step-login">
            <input type="text" id="login-id" placeholder="學員 ID">
            <input type="password" id="login-pw" placeholder="密碼">
            <button onclick="handleLogin()">登入</button>
            <p id="auth-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
        <div id="step-register" class="hidden">
            <p style="color: var(--text-sec); font-size: 0.9rem;">新 ID 偵測，請設定顯示名稱</p>
            <input type="text" id="reg-name" placeholder="顯示名稱">
            <button onclick="handleRegister()">確認註冊</button>
        </div>
    </div>
</div>

<div id="main-dashboard" class="dashboard hidden">
    <header>
        <div><div style="color: var(--text-sec); font-size: 0.8rem;" id="disp-id">ID: ---</div><h2 style="margin:0;" id="disp-name">Loading...</h2></div>
        <div style="background:rgba(59,130,246,0.2); color:var(--primary); padding:5px 12px; border-radius:20px; font-weight:bold;">STUDENT</div>
    </header>

    <div class="top-section">
        <div class="glass-panel overall-box">
            <div style="color: var(--text-sec); letter-spacing: 2px; font-size: 0.8rem;">OVERALL EVALUATION</div>
            <div id="overall-tier" class="overall-rank tier-null">--</div>
            <div style="color: var(--text-sec); font-size: 0.9rem;">總平均分: <span id="overall-avg" style="color: white; font-weight: bold;">未定</span></div>
            <div class="subject-grid" id="my-subject-grid"></div>
        </div>
        <div class="glass-panel"><canvas id="myChart"></canvas></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-mission" onclick="switchTab('mission')">任務</button>
        <button class="tab-btn" id="tab-history" onclick="switchTab('history')">歷史</button>
        <button class="tab-btn" id="tab-public" onclick="switchTab('public')">排行榜</button>
    </div>

    <div id="view-mission" class="glass-panel"><div id="mission-list"></div></div>
    <div id="view-history" class="glass-panel hidden"><div id="history-list"></div></div>
    <div id="view-public" class="glass-panel hidden"><div id="public-list"></div></div>
</div>

<div id="score-modal" class="modal hidden">
    <div class="glass-panel" style="width: 280px; text-align: center;">
        <h3 id="m-title">任務</h3><p id="m-sub" style="color:var(--text-sec);"></p>
        <input type="number" id="m-score" placeholder="分數 (0-100)">
        <div style="display:flex; gap:10px;"><button style="background:transparent; border:1px solid var(--border);" onclick="closeModal()">取消</button><button onclick="submitScore()">送出</button></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A", authDomain: "oaa-system-338b3.firebaseapp.com", projectId: "oaa-system-338b3", storageBucket: "oaa-system-338b3.firebasestorage.app", messagingSenderId: "245860425104", appId: "1:245860425104:web:9b224f32dd70763bda2715" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let currentUser = null, chartInstance = null, activeMid = null, activeSub = null;
    const SUBJECTS = ["國文","英文","數學","物理","地科","公民","歷史"];

    // 依照平均分數直接決定評級
    function getTier(avg) {
        if (avg === null || avg === undefined) return { t: '未定', c: 'tier-null' };
        if (avg >= 95) return { t: 'S', c: 'tier-S' };
        if (avg >= 85) return { t: 'A+', c: 'tier-A-plus' };
        if (avg >= 80) return { t: 'A', c: 'tier-A' };
        if (avg >= 70) return { t: 'B', c: 'tier-B' };
        if (avg >= 60) return { t: 'C', c: 'tier-C' };
        return { t: 'D', c: 'tier-D' };
    }

    async function handleLogin() {
        const id = document.getElementById('login-id').value.trim(), pw = document.getElementById('login-pw').value;
        const snap = await db.collection("users").where("loginId", "==", id).get();
        if(!snap.empty) {
            const doc = snap.docs[0];
            if(doc.data().password === pw) { currentUser = { docId: doc.id, ...doc.data() }; enter(); }
            else alert("密碼錯誤");
        } else {
            document.getElementById('step-login').classList.add('hidden'); document.getElementById('step-register').classList.remove('hidden');
        }
    }

    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const newData = { loginId: document.getElementById('login-id').value, password: document.getElementById('login-pw').value, username: name, history: [], completedMissions: [] };
        const res = await db.collection("users").add(newData); currentUser = { docId: res.id, ...newData }; enter();
    }

    function enter() {
        document.getElementById('auth-screen').classList.add('hidden'); document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('disp-id').innerText = `ID: ${currentUser.loginId}`; document.getElementById('disp-name').innerText = currentUser.username;
        render(); listenMissions(); loadPublic();
    }

    function render() {
        let sumAvg = 0, count = 0, radar = [];
        const grid = document.getElementById('my-subject-grid'); grid.innerHTML = "";
        
        SUBJECTS.forEach(sub => {
            const hist = (currentUser.history || []).filter(h => h.subject === sub);
            const avg = hist.length ? hist.reduce((a,b)=>a+b.score,0)/hist.length : null;
            const tier = getTier(avg);
            if(avg !== null) { sumAvg += avg; count++; }
            radar.push(avg || 0);
            grid.innerHTML += `<div class="sub-box"><div><div class="sub-name">${sub}</div><div class="sub-score ${tier.c}">${tier.t}</div></div><div style="font-size:0.9rem;">${avg ? avg.toFixed(0)+'分' : '--'}</div></div>`;
        });

        const totalAvg = count > 0 ? sumAvg / count : null;
        const mainTier = getTier(totalAvg);
        document.getElementById('overall-avg').innerText = totalAvg ? totalAvg.toFixed(1) : "未定";
        const rEl = document.getElementById('overall-tier'); rEl.innerText = mainTier.t; rEl.className = `overall-rank ${mainTier.c}`;

        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'radar', data: { labels: SUBJECTS, datasets: [{ data: radar, backgroundColor: 'rgba(59,130,246,0.2)', borderColor: '#3b82f6' }] }, options: { scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks:{display:false} } }, plugins: { legend: { display: false } } } });
        
        const hList = document.getElementById('history-list'); hList.innerHTML = "";
        [...currentUser.history].sort((a,b)=>b.timestamp-a.timestamp).forEach(h => {
            hList.innerHTML += `<div class="history-item"><div><b>${h.subject}</b><br><small>${new Date(h.timestamp).toLocaleString()}</small></div><div>${h.score}分</div></div>`;
        });
    }

    function listenMissions() {
        db.collection("missions").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('mission-list'); list.innerHTML = "";
            snap.forEach(doc => {
                if(currentUser.completedMissions.includes(doc.id)) return;
                const m = doc.data();
                list.innerHTML += `<div class="mission-item" id="m-${doc.id}"><div><b>${m.title}</b><br><small>${m.subject}</small></div><button onclick="openModal('${doc.id}','${m.subject}','${m.title}')">填寫</button></div>`;
            });
        });
    }

    function openModal(id, sub, title) { activeMid = id; activeSub = sub; document.getElementById('m-title').innerText = title; document.getElementById('m-sub').innerText = sub; document.getElementById('score-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('score-modal').classList.add('hidden'); }
    async function submitScore() {
        const val = parseInt(document.getElementById('m-score').value);
        if(isNaN(val)) return;
        const rec = { mid: activeMid, subject: activeSub, score: val, timestamp: Date.now() };
        currentUser.history.push(rec); currentUser.completedMissions.push(activeMid);
        render(); closeModal();
        await db.collection("users").doc(currentUser.docId).update({ history: firebase.firestore.FieldValue.arrayUnion(rec), completedMissions: firebase.firestore.FieldValue.arrayUnion(activeMid) });
    }

    function loadPublic() {
        db.collection("users").onSnapshot(snap => {
            let users = [];
            snap.forEach(doc => {
                const d = doc.data();
                let sum = 0, c = 0, subs = {};
                SUBJECTS.forEach(s => {
                    const h = (d.history || []).filter(x => x.subject === s);
                    const avg = h.length ? h.reduce((a,b)=>a+b.score,0)/h.length : null;
                    if(avg !== null) { sum += avg; c++; }
                    subs[s] = getTier(avg);
                });
                d.totalAvg = c > 0 ? sum / c : null; d.subTiers = subs;
                users.push(d);
            });
            users.sort((a,b) => (b.totalAvg || 0) - (a.totalAvg || 0));
            const list = document.getElementById('public-list'); list.innerHTML = "";
            users.forEach((u, i) => {
                const mt = getTier(u.totalAvg);
                let detail = `<div class="user-detail-panel hidden" id="detail-${i}"><div class="subject-grid">`;
                SUBJECTS.forEach(s => { detail += `<div class="sub-box" style="padding:5px;"><div>${s}</div><div class="${u.subTiers[s].c}">${u.subTiers[s].t}</div></div>`; });
                detail += `</div></div>`;
                list.innerHTML += `<div class="roster-item" onclick="document.getElementById('detail-${i}').classList.toggle('hidden')"><div class="roster-main"><div class="rank-num">#${i+1}</div><div style="flex:1;"><b>${u.username}</b><br><small>${u.loginId}</small></div><div class="${mt.c}" style="font-size:1.5rem; font-weight:900;">${mt.t}</div></div>${detail}</div>`;
            });
        });
    }

    function switchTab(t) {
        ['mission','history','public'].forEach(x => {
            document.getElementById('tab-'+x).classList.toggle('active', t===x);
            document.getElementById('view-'+x).classList.toggle('hidden', t!==x);
        });
    }
</script>
</body>
</html>
