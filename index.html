<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAA SYSTEM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #0a0e17; --surface: rgba(16, 24, 39, 0.7); --border: rgba(59, 130, 246, 0.3);
            --primary: #3b82f6; --text-main: #f8fafc; --text-sec: #94a3b8;
            --s: #fbbf24; --a-plus: #38bdf8; --a: #3b82f6; --b: #34d399; --c: #f97316; --d: #ef4444;
        }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* 玻璃擬物風格 */
        .glass-panel { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        
        /* 登入區 */
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { width: 320px; text-align: center; }
        .auth-box h1 { letter-spacing: 4px; color: var(--primary); margin-bottom: 30px; font-weight: 900; }
        input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(59,130,246,0.3); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        button:hover { background: #2563eb; }

        /* 主畫面 */
        .dashboard { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 50px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        
        /* 雙欄佈局 (雷達圖 + 方格) */
        .top-section { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        @media(min-width: 600px) { .top-section { grid-template-columns: 1fr 1fr; } }
        
        /* 總評價 */
        .overall-box { text-align: center; }
        .overall-rank { font-size: 5rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        
        /* 科目方格 */
        .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .sub-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 0.9rem; color: var(--text-sec); }
        .sub-score { font-weight: bold; font-size: 1.1rem; }
        .sub-pts { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }

        /* 頁籤切換 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text-sec); }
        .tab-btn.active { background: rgba(59,130,246,0.2); color: var(--primary); border-color: var(--primary); }

        /* 任務列表 */
        .mission-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--primary); }
        
        /* 公開名冊 */
        .user-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .user-card:hover { border-color: var(--primary); }
        .user-header { display: flex; justify-content: space-between; align-items: center; }
        .user-details { margin-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px; display: none; }
        .user-card.expanded .user-details { display: block; }

        /* 彈窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; }
        
        .tier-S { color: var(--s); } .tier-A-plus { color: var(--a-plus); } .tier-A { color: var(--a); }
        .tier-B { color: var(--b); } .tier-C { color: var(--c); } .tier-D { color: var(--d); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="glass-panel auth-box">
        <h1>OAA SYSTEM</h1>
        <div id="step-login">
            <input type="text" id="login-id" placeholder="輸入學員 ID">
            <input type="password" id="login-pw" placeholder="輸入密碼">
            <button onclick="handleLogin()">登入系統</button>
            <p id="auth-msg" style="color: #ef4444; font-size: 0.85rem; margin-top: 15px; height: 15px;"></p>
        </div>
        <div id="step-register" class="hidden">
            <p style="color: var(--text-sec); font-size: 0.9rem;">此為全新 ID，請設定您的顯示名稱</p>
            <input type="text" id="reg-name" placeholder="輸入顯示名稱 (例如: 凌小路)">
            <button onclick="handleRegister()">確認綁定</button>
        </div>
    </div>
</div>

<div id="main-dashboard" class="dashboard hidden">
    <header>
        <div>
            <div style="color: var(--text-sec); font-size: 0.85rem;" id="disp-id">ID: ---</div>
            <h2 style="margin: 0; font-size: 1.8rem;" id="disp-name">Loading...</h2>
        </div>
        <div style="background: rgba(59,130,246,0.2); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-weight: bold;">STUDENT</div>
    </header>

    <div class="top-section">
        <div class="glass-panel overall-box">
            <div style="color: var(--text-sec); letter-spacing: 2px; font-size: 0.85rem;">OVERALL EVALUATION</div>
            <div id="overall-tier" class="overall-rank tier-D">--</div>
            <div style="color: var(--text-sec); font-size: 0.9rem;">總評點數: <span id="overall-pts" style="color: white; font-weight: bold;">0.00</span></div>
            <div class="subject-grid" id="my-subject-grid">
                </div>
        </div>
        <div class="glass-panel" style="display: flex; justify-content: center; align-items: center;">
            <canvas id="myChart" style="max-height: 250px; width: 100%;"></canvas>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-mission" onclick="switchTab('mission')">待辦任務</button>
        <button class="tab-btn" id="tab-public" onclick="switchTab('public')">全校公開面板</button>
    </div>

    <div id="view-mission" class="glass-panel">
        <div id="mission-list"><p style="text-align: center; color: var(--text-sec);">目前無指派任務</p></div>
    </div>

    <div id="view-public" class="glass-panel hidden">
        <div id="public-list"><p style="text-align: center; color: var(--text-sec);">載入資料中...</p></div>
    </div>
</div>

<div id="score-modal" class="modal hidden">
    <div class="glass-panel" style="width: 280px; text-align: center;">
        <h3 id="m-title" style="margin-top: 0;">任務</h3>
        <p id="m-sub" style="color: var(--text-sec); margin-bottom: 20px;">科目</p>
        <input type="number" id="m-score" placeholder="輸入分數 (0-100)">
        <div style="display: flex; gap: 10px;">
            <button style="background: transparent; border: 1px solid var(--border);" onclick="closeModal()">取消</button>
            <button onclick="submitScore()">送出</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCR7mJ39_Chf_x-iNFAPtcLv_p36ywdY7A", authDomain: "oaa-system-338b3.firebaseapp.com", projectId: "oaa-system-338b3", storageBucket: "oaa-system-338b3.firebasestorage.app", messagingSenderId: "245860425104", appId: "1:245860425104:web:9b224f32dd70763bda2715" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();

    let currentUser = null, chartInstance = null;
    let activeMid = null, activeSub = null;
    const SUBJECTS = ["國文","英文","數學","物理","地科","公民","歷史"];

    // 點數轉換邏輯 (核心演算法)
    function calcTier(score) {
        if(score >= 95) return { tier: 'S', pts: 8, cls: 'tier-S' };
        if(score >= 85) return { tier: 'A+', pts: 6, cls: 'tier-A-plus' };
        if(score >= 80) return { tier: 'A', pts: 4, cls: 'tier-A' };
        if(score >= 70) return { tier: 'B', pts: 3, cls: 'tier-B' };
        if(score >= 60) return { tier: 'C', pts: 2, cls: 'tier-C' };
        return { tier: 'D', pts: 1, cls: 'tier-D' }; // 低於60為D
    }

    function calcOverall(avgPts) {
        // 沒滿的就往下 (向下取整對應)
        if(avgPts >= 8) return { tier: 'S', cls: 'tier-S' };
        if(avgPts >= 6) return { tier: 'A+', cls: 'tier-A-plus' };
        if(avgPts >= 4) return { tier: 'A', cls: 'tier-A' };
        if(avgPts >= 3) return { tier: 'B', cls: 'tier-B' };
        if(avgPts >= 2) return { tier: 'C', cls: 'tier-C' };
        return { tier: 'D', cls: 'tier-D' };
    }

    // --- 登入與註冊 ---
    async function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value;
        const msg = document.getElementById('auth-msg');
        if(!id || !pw) { msg.innerText = "請輸入 ID 與密碼"; return; }

        msg.innerText = "驗證中..."; msg.style.color = "var(--primary)";
        try {
            const snap = await db.collection("users").where("loginId", "==", id).get();
            if(!snap.empty) {
                const doc = snap.docs[0];
                if(doc.data().password === pw) {
                    currentUser = { docId: doc.id, ...doc.data() };
                    enterDashboard();
                } else {
                    msg.innerText = "密碼錯誤！"; msg.style.color = "#ef4444";
                }
            } else {
                // 找不到ID，進入註冊流程
                document.getElementById('step-login').classList.add('hidden');
                document.getElementById('step-register').classList.remove('hidden');
            }
        } catch(e) { msg.innerText = "連線失敗"; msg.style.color = "#ef4444"; }
    }

    async function handleRegister() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value;
        const name = document.getElementById('reg-name').value.trim();
        if(!name) return alert("請輸入顯示名稱");

        const newData = {
            loginId: id, password: pw, username: name,
            scores: {"國文":0,"英文":0,"數學":0,"物理":0,"地科":0,"公民":0,"歷史":0},
            completedMissions: []
        };
        const docRef = await db.collection("users").add(newData);
        currentUser = { docId: docRef.id, ...newData };
        enterDashboard();
    }

    // --- 進入系統 ---
    function enterDashboard() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('disp-id').innerText = `ID: ${currentUser.loginId}`;
        document.getElementById('disp-name').innerText = currentUser.username;
        renderMyStats();
        listenMissions();
        loadPublicRoster();
    }

    // --- 渲染個人面板 (雷達圖 + 方格) ---
    function renderMyStats() {
        const scores = currentUser.scores || {};
        let totalPts = 0;
        const gridEl = document.getElementById('my-subject-grid');
        gridEl.innerHTML = "";
        let radarData = [];

        SUBJECTS.forEach(sub => {
            const sc = scores[sub] || 0;
            const eval = calcTier(sc);
            totalPts += eval.pts;
            radarData.push(sc);

            gridEl.innerHTML += `
                <div class="sub-box">
                    <div>
                        <div class="sub-name">${sub}</div>
                        <div class="sub-score ${eval.cls}">${eval.tier}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.8rem;">${sc} 分</div>
                        <div class="sub-pts">${eval.pts} pt</div>
                    </div>
                </div>
            `;
        });

        const avgPts = totalPts / 7;
        const overall = calcOverall(avgPts);
        document.getElementById('overall-pts').innerText = avgPts.toFixed(2);
        const rankEl = document.getElementById('overall-tier');
        rankEl.innerText = overall.tier;
        rankEl.className = `overall-rank ${overall.cls}`;

        // 雷達圖
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chartInstance) { chartInstance.data.datasets[0].data = radarData; chartInstance.update(); }
        else {
            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: { labels: SUBJECTS, datasets: [{ data: radarData, backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', pointBackgroundColor: '#fff' }] },
                options: { scales: { r: { suggestedMin: 0, suggestedMax: 100, ticks:{display:false}, angleLines:{color:'rgba(255,255,255,0.1)'}, grid:{color:'rgba(255,255,255,0.1)'}, pointLabels:{color:'#94a3b8'} } }, plugins: { legend: { display: false } } }
            });
        }
    }

    // --- 任務系統 ---
    function listenMissions() {
        db.collection("missions").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('mission-list'); list.innerHTML = "";
            let has = false;
            snap.forEach(doc => {
                if((currentUser.completedMissions || []).includes(doc.id)) return;
                has = true; const data = doc.data();
                list.innerHTML += `
                    <div class="mission-item">
                        <div>
                            <div style="font-weight:bold; font-size:1.1rem; margin-bottom:4px;">${data.title}</div>
                            <div style="font-size:0.85rem; color:var(--text-sec);">科目：${data.subject}</div>
                        </div>
                        <button style="width:80px; padding:8px;" onclick="openModal('${doc.id}','${data.subject}','${data.title}')">填寫</button>
                    </div>`;
            });
            if(!has) list.innerHTML = '<p style="text-align: center; color: var(--text-sec);">目前無指派任務</p>';
        });
    }

    function openModal(id, sub, title) { activeMid = id; activeSub = sub; document.getElementById('m-title').innerText = title; document.getElementById('m-sub').innerText = `目標科目：${sub}`; document.getElementById('m-score').value = ""; document.getElementById('score-modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('score-modal').classList.add('hidden'); }
    
    async function submitScore() {
        const val = parseInt(document.getElementById('m-score').value);
        if(isNaN(val) || val < 0 || val > 100) return alert("請輸入 0-100 的數字");
        
        currentUser.scores[activeSub] = val;
        currentUser.completedMissions.push(activeMid);
        renderMyStats(); closeModal(); loadPublicRoster(); // 更新自己畫面
        
        await db.collection("users").doc(currentUser.docId).update({
            [`scores.${activeSub}`]: val, completedMissions: firebase.firestore.FieldValue.arrayUnion(activeMid)
        });
    }

    // --- 全校公開面板 ---
    async function loadPublicRoster() {
        db.collection("users").onSnapshot(snap => {
            let users = [];
            snap.forEach(doc => {
                const data = doc.data();
                let pts = 0;
                SUBJECTS.forEach(s => pts += calcTier(data.scores[s]||0).pts);
                data.avgPts = pts / 7;
                users.push(data);
            });
            users.sort((a,b) => b.avgPts - a.avgPts); // 依點數排行

            const list = document.getElementById('public-list'); list.innerHTML = "";
            users.forEach(u => {
                const oEval = calcOverall(u.avgPts);
                let gridHTML = `<div class="subject-grid">`;
                SUBJECTS.forEach(s => {
                    const eval = calcTier(u.scores[s]||0);
                    gridHTML += `<div class="sub-box"><div><div class="sub-name">${s}</div><div class="${eval.cls} font-bold">${eval.tier}</div></div><div class="sub-pts">${eval.pts}pt</div></div>`;
                });
                gridHTML += `</div>`;

                list.innerHTML += `
                    <div class="user-card" onclick="this.classList.toggle('expanded')">
                        <div class="user-header">
                            <div><div style="font-weight:bold; font-size:1.1rem;">${u.username}</div><div style="font-size:0.8rem; color:var(--text-sec);">${u.loginId}</div></div>
                            <div style="text-align:right;"><div class="${oEval.cls}" style="font-size:1.5rem; font-weight:900;">${oEval.tier}</div><div style="font-size:0.8rem; color:var(--text-sec);">Pts: ${u.avgPts.toFixed(2)}</div></div>
                        </div>
                        <div class="user-details">${gridHTML}</div>
                    </div>`;
            });
        });
    }

    function switchTab(tab) {
        document.getElementById('tab-mission').classList.toggle('active', tab==='mission');
        document.getElementById('tab-public').classList.toggle('active', tab==='public');
        document.getElementById('view-mission').classList.toggle('hidden', tab!=='mission');
        document.getElementById('view-public').classList.toggle('hidden', tab!=='public');
    }
</script>
</body>
</html>
